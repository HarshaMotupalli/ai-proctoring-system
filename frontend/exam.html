.box{

    <div>Student</div>
</div>

<div class="container">

<div class="navigator">
<div class="grid" id="palette"></div>
</div>

<!-- CENTER -->
<div class="center">

<div id="timer" class="timer"></div>

<div class="question-box">

<div class="top-bar">
<div></div>
<button class="finish" onclick="finishExam()">Finish</button>
</div>

<div id="options"></div>

<div class="buttons">
<button class="btn" onclick="prev()">Prev</button>
<button class="btn" onclick="save()">Save</button>
<button class="btn" onclick="remind()">Remind Later</button>
</div>

</div>

</div>

<!-- MONITOR -->
<div class="monitor">

<video id="video" autoplay></video>

<div id="faceBlock" class="block safe">
<span>Face Count</span><span id="faceVal">0</span>
</div>

<div id="objectBlock" class="block safe">
<span>Object</span><span id="objectVal">None</span>
</div>

<div id="multiBlock" class="block safe">
<span>Multiple</span><span id="multiVal">0</span>
</div>

<div id="awayBlock" class="block safe">
<span>Looking</span><span id="awayVal">CENTER</span>
</div>

</div>

</div>

<div id="banner"></div>
<div id="countdown"></div>

<script>

// ---------------- QUESTIONS ----------------
const questions = [
    {
        q: "Which of these is a real-world application of AI?", 
        options: ["a) Self-driving cars", "b) Mechanical watches", "c) Paper maps", "d) Manual typewriters"]
    },
    {
        q: "What does 'ML' stand for in the tech world?", 
        options: ["a) Modern Logic", "b) Machine Learning", "c) Mobile Link", "d) Multi Layer"]
    },
    {
        q: "Which of these is a popular AI-powered virtual assistant?", 
        options: ["a) Photoshop", "b) Excel", "c) Alexa", "d) Notepad"]
    },
    {
        q: "What is the name of the data used to teach an AI model?", 
        options: ["a) Finished data", "b) Training data", "c) Deleted data", "d) Hidden data"]
    },
    {
        q: "In AI, what is a 'Chatbot'?", 
        options: ["a) A physical robot that cleans", "b) A program that simulates conversation", "c) A type of computer mouse", "d) A social media profile"]
    },
    {
        q: "Which part of a computer is most commonly used to speed up AI processing?", 
        options: ["a) Keyboard", "b) Monitor", "c) GPU (Graphics Card)", "d) Power Supply"]
    },
    {
        q: "What do we call AI that can perform any intellectual task a human can?", 
        options: ["a) Narrow AI", "b) Weak AI", "c) Artificial General Intelligence (AGI)", "d) Basic AI"]
    },
    {
        q: "Which field of AI deals with machines understanding human speech?", 
        options: ["a) Speech Recognition", "b) Database Management", "c) Web Design", "d) Cybersecurity"]
    },
    {
        q: "What is a 'Dataset'?", 
        options: ["a) A single piece of paper", "b) A collection of related data", "c) A computer desk", "d) A software update"]
    },
    {
        q: "Which company created the AI model known as ChatGPT?", 
        options: ["a) Microsoft", "b) Apple", "c) OpenAI", "d) Meta"]
    }
];

// ✅ ANSWER KEY (for dashboard later)
const answerKey = [0, 1, 2, 1, 1, 2, 2, 0, 1, 2];

let current=0;
let answers=[];

// LOAD
function load(){
    const q=questions[current];
    document.getElementById("qText").innerText=`Q${current+1}. ${q.q}`;

    let html="";
    q.options.forEach((o,i)=>{
        html+=`<div class="option ${answers[current]==i?"selected":""}" onclick="select(${i})">${o}</div>`;
    });

    document.getElementById("options").innerHTML=html;
    renderGrid();
}

function select(i){
    answers[current]=(answers[current]==i)?null:i;
    load();
}

function prev(){if(current>0){current--;load();}}
function save(){if(current<questions.length-1){current++;load();}}
function remind(){answers[current]=null;save();}

// GRID
function renderGrid(){
    let html="";
    questions.forEach((_,i)=>{
        html+=`<div class="box ${answers[i]!=null?"answered":"not"} ${i==current?"current":""}" onclick="gotoQ(${i})">${i+1}</div>`;
    });
    document.getElementById("palette").innerHTML=html;
}

function gotoQ(i){current=i;load();}

// TIMER
let t=600;
setInterval(()=>{
    let h=Math.floor(t/3600);
    let m=Math.floor((t%3600)/60);
    let s=t%60;
    document.getElementById("timer").innerText=
    h>0?`${h}:${m}:${s}`:`${m}:${s}`;
    t--;
},1000);

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

// WEBSOCKET
const ws=new WebSocket("ws://127.0.0.1:8000/ws/proctor");

ws.onmessage=(msg)=>{

    const data=JSON.parse(msg.data);

    const face=data.face_count;
    const obj=data.detected_objects?.length?data.detected_objects.join(", "):"None";
    const look=data.looking_direction;
    const multi=face>1?face:0;

    document.getElementById("faceVal").innerText=face;
    document.getElementById("objectVal").innerText=obj;
    document.getElementById("multiVal").innerText=multi;
    document.getElementById("awayVal").innerText=look;

    updateBlock(faceBlock,face===1);
    updateBlock(objectBlock,obj==="None");
    updateBlock(multiBlock,face<=1);
    updateBlock(awayBlock,look==="CENTER");

    handleStatus(data.status,data.reason);
};

function updateBlock(el,safe){
    el.classList.remove("safe","warn");
    el.classList.add(safe?"safe":"warn");
}

// ALERT
function handleStatus(status,reason){

    banner.innerHTML="";
    countdown.innerHTML="";

    if(status==="SAFE") return;

    banner.innerHTML=`<div style="background:red;color:white;padding:10px;border-radius:8px">${reason}</div>`;

    if(status==="TERMINATE"){
        startCountdown();
    }
}

let seconds = 5;
let interval;

function startCountdown() {
    clearInterval(interval);

    interval = setInterval(() => {
        countdown.innerText = "Terminating in " + seconds + "s";
        seconds--;

        if (seconds < 0) {
            clearInterval(interval);   // ✅ stop interval
            terminate();
        }
    }, 1000);
}

function terminate() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();   // ✅ safe close
    }

    alert("Exam Terminated");

    // ✅ redirect to dashboard
    window.location.href = "dashboard.html";
}

// SEND FRAME
let last=0;

function sendFrame(){
    let now=Date.now();
    if(now-last<200) return;
    last=now;

    if(video.videoWidth===0) return;

    const canvas=document.createElement("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    const ctx=canvas.getContext("2d");
    ctx.drawImage(video,0,0);

    if(ws.readyState===1){
        ws.send(canvas.toDataURL("image/jpeg",0.6));
    }
}

setInterval(sendFrame,100);

// FINISH
function finishExam(){
    let score=0;
    answers.forEach((a,i)=>{if(a===answerKey[i]) score++;});

    localStorage.setItem("exam_result",JSON.stringify({
        score,total:questions.length
    }));

    window.location.href="dashboard.html";
}
