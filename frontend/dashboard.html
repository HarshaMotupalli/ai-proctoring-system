<!DOCTYPE html>
<html>
<head>
<title>Exam Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- 🔥 REQUIRED -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    color: #1e293b;
}

.header {
    height: 65px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
}

.dashboard-title {
    margin: 25px auto;
    width: fit-content;
    padding: 10px 25px;
    border-radius: 30px;
    background: linear-gradient(135deg,#c7d2fe,#e0e7ff);
    font-weight: 600;
    font-size: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 25px;
    padding: 0 40px 40px;
}

.card {
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* COLORS */
.score { background: linear-gradient(135deg,#dbeafe,#eff6ff); }
.status { background: linear-gradient(135deg,#dcfce7,#ecfdf5); }
.risk { background: linear-gradient(135deg,#fee2e2,#fff1f2); }
.time { background: linear-gradient(135deg,#fef9c3,#fefce8); }
.pie { background: linear-gradient(135deg,#ede9fe,#f5f3ff); }
.bar { background: linear-gradient(135deg,#cffafe,#ecfeff); }

.card h3 {
    font-size: 15px;
}

.card p {
    font-size: 14px;
    line-height: 1.6;
}

.pass { color: green; }
.fail { color: red; }

canvas {
    max-height: 180px;
}

</style>
</head>

<body>

<div class="header">
    <div>AI Proctoring</div>
    <div>Hi, User</div>
</div>

<div class="dashboard-title">Exam Dashboard</div>

<div class="grid">

<div class="card score">
<h3>Score</h3>
<p id="score"></p>
<p id="passFail"></p>
<p id="analysis"></p>
</div>

<div class="card status">
<h3>Status</h3>
<p id="status"></p>
<p id="violationText"></p>
</div>

<div class="card risk">
<h3>Risk Score</h3>
<canvas id="riskChart"></canvas>
</div>

<div class="card time">
<h3>Time Consumed</h3>
<p id="time"></p>
</div>

<div class="card pie">
<h3>Answer Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="card bar">
<h3>Violations</h3>
<canvas id="barChart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// ---------------- DOM ELEMENTS ----------------
const scoreEl = document.getElementById("score");
const passFail = document.getElementById("passFail");
const analysis = document.getElementById("analysis");
const timeEl = document.getElementById("time");

const status = document.getElementById("status");
const violationText = document.getElementById("violationText");

// ---------------- GET DATA ----------------
const result = JSON.parse(localStorage.getItem("exam_result"));
const user_id = localStorage.getItem("user_id");

console.log("Exam Result:", result);

if (!result) {
    alert("No exam data found!");
    throw new Error("No exam result");
}

// ---------------- SAFE DEFAULTS ----------------
const answers = result.answers || [];
const total = result.total || 0;
const storedScore = result.score || 0;
const examTime = result.time || 0;

// ---------------- SCORE DISPLAY ----------------
scoreEl.innerText = `Score: ${storedScore} / ${total}`;

// PASS / FAIL
if (storedScore >= total * 0.5) {
    passFail.innerText = "Status: PASS";
    passFail.className = "pass";
} else {
    passFail.innerText = "Status: FAIL";
    passFail.className = "fail";
}

// ---------------- ANSWER ANALYSIS ----------------
const answerKey = [0,1,2,1,1,2,2,0,1,2];

let correct = 0, wrong = 0, notAnswered = 0;

for (let i = 0; i < answerKey.length; i++) {
    const ans = answers[i];

    if (ans === null || ans === undefined) {
        notAnswered++;
    } else if (ans === answerKey[i]) {
        correct++;
    } else {
        wrong++;
    }
}

analysis.innerText = 
`Correct: ${correct} | Wrong: ${wrong} | Not Answered: ${notAnswered}`;

// ---------------- TIME FORMAT ----------------
const seconds = Math.floor(examTime / 1000);

const hrs = Math.floor(seconds / 3600);
const mins = Math.floor((seconds % 3600) / 60);
const secs = seconds % 60;

timeEl.innerText = hrs > 0
    ? `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`
    : `${mins}:${secs.toString().padStart(2,'0')}`;

// ---------------- PIE CHART ----------------
const pieCanvas = document.getElementById("pieChart");

if (pieCanvas) {
    new Chart(pieCanvas, {
        type: 'pie',
        data: {
            labels: ["Correct","Wrong","Not Answered"],
            datasets: [{
                data: [correct, wrong, notAnswered]
            }]
        }
    });
}

// ---------------- FETCH LOGS ----------------
async function loadLogs() {

    try {
        const res = await fetch(`http://127.0.0.1:8000/logs/${user_id}`);

        if (!res.ok) throw new Error("API failed");

        const data = await res.json();

        console.log("Logs:", data);

        if (!data || data.length === 0) {
            status.innerText = "Clean Exam";
            violationText.innerText = "No Violations";
            return;
        }

        status.innerText = "Violations Detected";
        violationText.innerText = "Total Violations: " + data.length;

        // ---------------- COUNT TYPES ----------------
        let counts = {
            LOOKING_AWAY: 0,
            MULTIPLE_FACES: 0,
            PHONE_DETECTED: 0
        };

        data.forEach(v => {
            const type = v.type.toUpperCase();

            if (counts[type] !== undefined) {
                counts[type]++;
            }
        });

        // ---------------- BAR CHART ----------------
        const barCanvas = document.getElementById("barChart");

        if (barCanvas) {
            new Chart(barCanvas, {
                type: 'bar',
                data: {
                    labels: ["Multiple Faces", "Phone", "Looking Away"],
                    datasets: [{
                        label: "Violations",
                        data: [
                            counts.MULTIPLE_FACES,
                            counts.PHONE_DETECTED,
                            counts.LOOKING_AWAY
                        ]
                    }]
                }
            });
        }

        // ---------------- RISK GRAPH ----------------
        const riskCanvas = document.getElementById("riskChart");

        if (riskCanvas) {
            const riskValues = data.map((_, i) => i * 10);

            new Chart(riskCanvas, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i + 1),
                    datasets: [{
                        label: "Risk Score",
                        data: riskValues
                    }]
                }
            });
        }

    } catch (err) {
        console.error("Dashboard Error:", err);
        status.innerText = "Error Loading Data";
        violationText.innerText = "";
    }
}

// ---------------- INIT ----------------
loadLogs();

</script>

</body>
</html>
