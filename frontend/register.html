<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Proctoring Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #2b5876, #4e4376);
    padding: 20px;   /* 🔥 prevents cutting */
}

/* MAIN CARD */
.container {
    display: flex;
    width: 950px;
    max-height: 90vh;   /* 🔥 important */
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* LEFT SIDE */
.left {
    flex: 1;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 30px;
}

.left p {
    margin-top: 10px;
    opacity: 0.8;
}

/* 🤖 ROBOT */
.robot-box {
    margin-top: 40px;
}

.robot-box img {
    width: 150px;
    animation: float 3s ease-in-out infinite;
}

/* floating animation */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* RIGHT SIDE */
.right {
    flex: 1;
    padding: 40px;
    overflow-y: auto;   /* 🔥 enables scroll */
}

.right h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
.input-box {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus {
    border-color: #007bff;
    outline: none;
}

/* CAMERA */
.camera-box {
    margin-top: 15px;
    text-align: center;
}

video {
    width: 100%;
    height: 220px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid #eee;
}

.capture-btn {
    margin-top: 10px;
    padding: 8px 20px;
    border-radius: 20px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
}

#retakeBtn {
    background: red;
    display: none;
}

/* SUBMIT */
.submit-btn {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #28a745;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.submit-btn:hover {
    background: #218838;
}

/* STATUS */
.status {
    margin-top: 10px;
    text-align: center;
    font-weight: 500;
}

.right::-webkit-scrollbar {
    width: 6px;
}

.right::-webkit-scrollbar-thumb {
    background: #aaa;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>AI Proctoring System</h1>
        <p>Smart monitoring for secure exams</p>

        <div class="robot-box">
            <!-- 🔥 REALISTIC ROBOT -->
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <h2>Register</h2>

        <div class="input-box">
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <div class="input-box">
            <input type="text" id="reg" placeholder="Register Number">
        </div>

        <div class="input-box">
            <input type="text" id="college" placeholder="College Name">
        </div>

        <div class="camera-box">
            <video id="video" autoplay></video>

            <button class="capture-btn" onclick="capture()">Capture</button>
            <button class="capture-btn" id="retakeBtn" onclick="retake()">Retake</button>
        </div>

        <button class="submit-btn" onclick="register()">Register</button>

        <div class="status" id="status"></div>

    </div>

</div>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");

let capturedBlob = null;

// 🎥 START CAMERA (HD + stable)
navigator.mediaDevices.getUserMedia({
    video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        facingMode: "user"
    }
})
.then(stream => {
    video.srcObject = stream;
})
.catch(() => {
    status.innerText = "Camera access denied!";
    status.style.color = "red";
});


// 📸 CAPTURE (IMPROVED QUALITY)
function capture() {

    if (video.videoWidth === 0) {
        status.innerText = "Camera not ready!";
        status.style.color = "red";
        return;
    }

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => {

        if (!blob) {
            status.innerText = "Capture failed!";
            status.style.color = "red";
            return;
        }

        capturedBlob = blob;

        status.innerText = "Image Captured ✔";
        status.style.color = "green";

        document.getElementById("retakeBtn").style.display = "inline-block";

    }, "image/jpeg", 0.95); // 🔥 HIGH QUALITY
}


// 🔁 RETAKE
function retake() {
    capturedBlob = null;

    status.innerText = "Retake image";
    status.style.color = "black";

    document.getElementById("retakeBtn").style.display = "none";
}


// 🚀 REGISTER
async function register() {

    if (!capturedBlob) {
        status.innerText = "Please capture image first!";
        status.style.color = "red";
        return;
    }

    const nameVal = document.getElementById("name").value.trim();
    const regVal = document.getElementById("reg").value.trim();
    const collegeVal = document.getElementById("college").value.trim();

    if (!nameVal || !regVal || !collegeVal) {
        status.innerText = "Fill all details!";
        status.style.color = "red";
        return;
    }

    status.innerText = "Registering...";
    status.style.color = "black";

    try {

        let formData = new FormData();
        formData.append("name", nameVal);
        formData.append("reg_no", regVal);
        formData.append("college", collegeVal);
        formData.append("image", capturedBlob, "face.jpg");

        const res = await fetch("http://127.0.0.1:8000/auth/register", {
            method: "POST",
            body: formData
        });

        const text = await res.text();
        console.log("RAW RESPONSE:", text);

        let data = {};
        try { data = JSON.parse(text); } catch {}

        // ✅ SUCCESS
        if (res.ok) {

            localStorage.setItem("user_id", data.user_id);

            status.innerText = "Registration Successful ✅";
            status.style.color = "green";

            setTimeout(() => {
                window.location.href = "verification.html";
            }, 1200);
        }

        // ❌ ERROR
        else {
            status.innerText = data.detail || "Registration failed";
            status.style.color = "red";
        }

    } catch (err) {
        console.error("NETWORK ERROR:", err);
        status.innerText = "Cannot connect to backend!";
        status.style.color = "red";
    }
}
</script>
