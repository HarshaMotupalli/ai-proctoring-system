<!DOCTYPE html>
<html>
<head>
    <title>AI Proctoring Live Test</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h2 { margin-top: 20px; }

        video {
            border-radius: 10px;
            border: 3px solid #333;
            margin-top: 15px;
        }

        .panel {
            margin-top: 20px;
            padding: 15px;
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            background: #1e293b;
        }

        .status-safe { color: lightgreen; }
        .status-warning { color: orange; }
        .status-severe { color: red; }
        .status-terminate {
            color: darkred;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        .banner {
            margin-top: 15px;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
        }

        .banner-warning { background: orange; color: black; }
        .banner-severe { background: red; }
        .banner-terminate { background: darkred; }

        #countdown {
            font-size: 20px;
            margin-top: 10px;
            font-weight: bold;
        }
        #terminationOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            color: red;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            z-index: 9999;
        }
    </style>
</head>

<body>

<h2>AI Proctoring System</h2>

<!-- ✅ USE VIDEO (not image)  -->
<video id="video" autoplay playsinline width="420"></video>

<div class="panel">
    <div id="details"></div>
    <div id="status"></div>
    <div id="banner"></div>
    <div id="countdown"></div>
</div>

<audio id="alertSound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio> 

<script>
const video = document.getElementById("video");
const details = document.getElementById("details");
const statusDiv = document.getElementById("status");
const banner = document.getElementById("banner");
const countdownDiv = document.getElementById("countdown");
const alertSound = document.getElementById("alertSound");

let terminateCountdown = null;
let secondsLeft = 5;
let lastStatus = "SAFE";

// ---------------- CAMERA ----------------
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// ---------------- WEBSOCKET ----------------
const ws = new WebSocket("ws://127.0.0.1:8000/ws/proctor");

ws.onopen = () => console.log("Connected to backend");

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    details.innerHTML = `
        <p><strong>Face Count:</strong> ${data.face_count}</p>
        <p><strong>Looking Direction:</strong> ${data.looking_direction}</p>
        <p><strong>Multiple Person Occurrences:</strong> ${data.multiple_person_occurrences}</p>
        <p><strong>Detected Objects:</strong> ${
            data.detected_objects && data.detected_objects.length > 0
                ? data.detected_objects.join(", ")
                : "None"
        }</p>
    `;

    updateStatus(data.status, data.reason);
};

ws.onerror = (e) => console.log("WebSocket error", e);

// ---------------- STATUS SYSTEM ----------------
function updateStatus(status, reason) {

    // Reset UI
    banner.innerHTML = "";
    countdownDiv.innerHTML = "";

    // Stop previous countdown
    clearInterval(terminateCountdown);

    // Stop sound if not termination
    if (status !== "TERMINATE") {
        alertSound.pause();
        alertSound.currentTime = 0;
        alertSound.loop = false;
    }

    // SAFE
    alertSound.pause();
    alertSound.currentTime = 0;
    alertSound.loop = false;
    if (status === "SAFE") {
        statusDiv.innerHTML = `<h3 class="status-safe">SAFE</h3>`;
    }
    

    // WARNING
    else if (status === "WARNING") {
        statusDiv.innerHTML = `<h3 class="status-warning">WARNING</h3>`;
        banner.innerHTML = `<div class="banner banner-warning">${reason}</div>`;

        // 🔔 Beep only once when status changes
        if (lastStatus !== "WARNING") {
            alertSound.play();
        }
    }

    // SEVERE WARNING
    else if (status === "SEVERE_WARNING") {
        statusDiv.innerHTML = `<h3 class="status-severe">SEVERE WARNING</h3>`;
        banner.innerHTML = `<div class="banner banner-severe">${reason}</div>`;

        if (lastStatus !== "SEVERE_WARNING") {
            alertSound.play();
        }
    }

    // TERMINATE
    else if (status === "TERMINATE") {

        statusDiv.innerHTML =
            `<h3 class="status-terminate">EXAM TERMINATION INITIATED</h3>`;

        banner.innerHTML =
            `<div class="banner banner-terminate">${reason}</div>`;

        // 🔊 Continuous alarm during countdown
        alertSound.loop = true;
        alertSound.play();

        secondsLeft = 5;
        countdownDiv.innerHTML = `Terminating in ${secondsLeft} seconds...`;

        terminateCountdown = setInterval(() => {

            secondsLeft--;

            countdownDiv.innerHTML =
                `Terminating in ${secondsLeft} seconds...`;

            if (secondsLeft <= 0) {

                clearInterval(terminateCountdown);

                // 🔴 Stop alarm completely
                alertSound.pause();
                alertSound.currentTime = 0;
                alertSound.loop = false;

                // 🔴 Close WebSocket
                ws.close();

                // 🔴 Stop webcam
                const stream = video.srcObject;
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }

                // 🔴 Stop sending frames
                clearInterval(frameInterval);

                // 🔴 Lock page interaction
                document.body.style.pointerEvents = "none";
                document.body.style.userSelect = "none";

                // 🔴 Show full screen overlay
                document.getElementById("terminationOverlay").style.display = "flex";
            }

        }, 1000);
    }

    lastStatus = status;
}

// Lock Page
function lockPage() {

    // Stop webcam
    const stream = video.srcObject;
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    // Stop sending frames
    clearInterval(frameInterval);

    // Disable interaction
    document.body.style.pointerEvents = "none";
    document.body.style.userSelect = "none";

    // Show overlay
    document.getElementById("terminationOverlay").style.display = "flex";
}

// ---------------- FRAME SENDER ----------------
function sendFrame() {
    if (video.readyState !== 4) return;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const dataURL = canvas.toDataURL("image/jpeg", 0.7);

    if (ws.readyState === WebSocket.OPEN) {
        ws.send(dataURL);
    }
}

// Faster detection
//setInterval(sendFrame, 200);
let frameInterval = setInterval(sendFrame, 200);

</script>


<div id="terminationOverlay">
    PROCTORING OCCURS EXAM WAS TERMINATED
</div>

</body>
</html>
